<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    ERP 登录
  </title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{

      background:

      linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
      );

      min-height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;

      padding:20px;

    }

    .login-box{

      width:100%;
      max-width:420px;

      background:

      rgba(17,24,39,.95);

      border:

      1px solid rgba(255,255,255,.05);

      backdrop-filter:blur(20px);

      border-radius:28px;

      padding:40px;

      color:white;

      box-shadow:

      0 10px 40px rgba(0,0,0,.4);

    }

    .logo{

      text-align:center;

      font-size:34px;

      font-weight:700;

      margin-bottom:10px;

    }

    .sub{

      text-align:center;

      opacity:.7;

      margin-bottom:35px;

    }

    .input-group{

      margin-bottom:18px;

    }

    .input-group label{

      display:block;

      margin-bottom:8px;

      opacity:.8;

      font-size:14px;

    }

    .input-group input{

      width:100%;

      background:#1e293b;

      border:none;

      color:white;

      padding:16px;

      border-radius:16px;

      outline:none;

      font-size:16px;

    }

    .login-btn{

      width:100%;

      border:none;

      background:#2563eb;

      color:white;

      padding:16px;

      border-radius:18px;

      font-size:16px;

      cursor:pointer;

      margin-top:10px;

      transition:.2s;

    }

    .login-btn:hover{

      transform:translateY(-2px);

      background:#3b82f6;

    }

    .tips{

      margin-top:25px;

      background:#0f172a;

      border-radius:18px;

      padding:18px;

      font-size:14px;

      line-height:1.8;

      opacity:.8;

    }

    .error{

      color:#f87171;

      margin-top:14px;

      text-align:center;

      display:none;

    }

  </style>

</head>

<body>

  <div class="login-box">

    <div class="logo">

      中越代购 ERP

    </div>

    <div class="sub">

      企业级 SaaS 管理系统

    </div>

    <div class="input-group">

      <label>
        用户名
      </label>

      <input
        id="username"
        placeholder="请输入用户名"
      />

    </div>

    <div class="input-group">

      <label>
        密码
      </label>

      <input
        id="password"
        type="password"
        placeholder="请输入密码"
      />

    </div>

    <button
      class="login-btn"
      onclick="login()"
    >
      登录系统
    </button>

    <div
      id="error"
      class="error"
    >
      登录失败
    </div>

    <div class="tips">

      <div>
        管理员：admin / 123456
      </div>

      <div>
        员工账号：staff / 123456
      </div>

    </div>

  </div>

  <script>

    const API =
    "https://apibuy.okla.de5.net"

    // 已登录

    if(

      localStorage.getItem(
        "erp_token"
      )

    ){

      location.href =
      "index.html"

    }

    // 登录

    async function login(){

      const username =
      document.getElementById(
        "username"
      ).value

      const password =
      document.getElementById(
        "password"
      ).value

      try{

        const res =
        await fetch(

          API + "/api/login",

          {

            method:"POST",

            headers:{
              "Content-Type":"application/json"
            },

            body:JSON.stringify({

              username,
              password

            })

          }

        )

        const data =
        await res.json()

        if(data.success){

          // TOKEN

          localStorage.setItem(

            "erp_token",

            data.token

          )

          // 用户信息

          localStorage.setItem(

            "erp_user",

            JSON.stringify(
              data.user
            )

          )

          // 登录状态

          localStorage.setItem(

            "erp_login",

            "true"

          )

          // 进入系统

          location.href =
          "index.html"

        }

        else{

          document
          .getElementById("error")
          .style.display =
          "block"

        }

      }

      catch(err){

        console.log(err)

      }

    }

  </script>

</body>
</html>
