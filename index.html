<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中越代购 SaaS ERP V13</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <!-- 左侧菜单 -->
  <div class="sidebar">
    <div class="logo">中越代购 ERP</div>
    <div class="menu">
      <button data-tab="dashboard">🏠 首页</button>
      <button data-tab="orders">📦 订单管理</button>
      <button data-tab="customers">👥 客户管理</button>
      <button data-tab="warehouse">🚚 包裹管理</button>
      <button data-tab="finance">💰 财务管理</button>
      <button data-tab="system">⚙ 系统管理</button>
    </div>
  </div>

  <!-- 主区域 -->
  <div class="main">
    <div id="dashboard" class="module">
      <h2>首页仪表盘</h2>
    </div>
    <div id="orders" class="module hidden">
      <h2>订单管理</h2>
      <button id="openOrderBtn" class="btn btn-primary">+ 新增订单</button>
      <div id="orderList"></div>
    </div>
    <div id="customers" class="module hidden"><h2>客户管理</h2></div>
    <div id="warehouse" class="module hidden"><h2>包裹管理</h2></div>
    <div id="finance" class="module hidden"><h2>财务管理</h2></div>
    <div id="system" class="module hidden"><h2>系统管理</h2></div>
  </div>
</div>

<!-- 新增订单弹窗 -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>新增订单</h3>
    <input id="customer" placeholder="客户名称">
    <input id="product" placeholder="商品名称">
    <input id="platform" placeholder="平台">
    <input id="amount" placeholder="订单金额">
    <input id="taobao_tracking" placeholder="淘宝物流单号">
    <input id="purchase_cost" placeholder="采购成本">
    <input id="shipping_cost" placeholder="国际物流成本">
    <input id="note" placeholder="备注">
    <div class="modal-actions">
      <button id="saveOrderBtn" class="btn btn-primary">保存订单</button>
      <button id="closeModalBtn" class="btn btn-danger">关闭</button>
    </div>
  </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
