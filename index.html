<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中越代购 ERP V13</title>
<link rel="stylesheet" href="style.css">
<!-- 引入 Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">
  <!-- 左侧菜单 -->
  <div class="sidebar">
    <div class="logo">中越代购 ERP</div>
    <div class="menu">
      <button data-tab="dashboard" class="active">🏠 首页</button>
      <button data-tab="orders">📦 订单管理</button>
      <button data-tab="customers">👥 客户管理</button>
      <button data-tab="warehouse">🚚 包裹管理</button>
      <button data-tab="finance">💰 财务管理</button>
      <button data-tab="system">⚙ 系统管理</button>
    </div>
  </div>

  <!-- 主区域 -->
  <div class="main">
    <!-- 首页仪表盘 -->
    <div id="dashboard" class="module">
      <h2>首页仪表盘</h2>

      <!-- KPI 卡片 -->
      <div class="dashboard-cards">
        <div class="card">本月订单数：<span id="dash_order_count">0</span></div>
        <div class="card">本月已发货：<span id="dash_shipped_count">0</span></div>
        <div class="card">本月利润：<span id="dash_profit">0</span></div>
        <div class="card">总客户数：<span id="dash_customer_count">0</span></div>
      </div>

      <!-- 订单状态饼图 -->
      <canvas id="dash_chart" width="400" height="200"></canvas>
    </div>

    <div id="orders" class="module hidden"></div>
    <div id="customers" class="module hidden"></div>
    <div id="warehouse" class="module hidden"></div>
    <div id="finance" class="module hidden"></div>
    <div id="system" class="module hidden"></div>
  </div>
</div>

<!-- 引入模块化 JS -->
<script src="js/app.js" defer></script>
<script src="js/orders.js" defer></script>
<script src="js/customers.js" defer></script>
<script src="js/warehouse.js" defer></script>
<script src="js/finance.js" defer></script>
<script src="js/system.js" defer></script>
<script src="js/dashboard.js" defer></script>

</body>
</html>
