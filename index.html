<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中越代购 ERP</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- 左侧菜单 -->
<div id="sidebar">
  <ul>
    <li data-module="dashboard" class="active">首页</li>
    <li data-module="orders">订单管理</li>
    <li data-module="customers">客户管理</li>
    <li data-module="warehouse">包裹管理</li>
    <li data-module="finance">财务管理</li>
    <li data-module="system">系统管理</li>
  </ul>
</div>

<!-- 主内容 -->
<div id="main">
  <div id="dashboard" class="module"></div>
  <div id="orders" class="module hidden"></div>
  <div id="customers" class="module hidden"></div>
  <div id="warehouse" class="module hidden"></div>
  <div id="finance" class="module hidden"></div>
  <div id="system" class="module hidden"></div>
</div>

<!-- JS -->
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/orders.js"></script>
<script src="js/customers.js"></script>
<script src="js/warehouse.js"></script>
<script src="js/finance.js"></script>
<script src="js/system.js"></script>

</body>
</html>
