<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>中越代购 ERP</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

  <!-- 登录检测 -->

  <script>

    if(

      localStorage.getItem("erp_login")

      !==

      "true"

    ){

      location.href = "login.html"

    }

  </script>

  <!-- 左侧菜单 -->

  <aside class="sidebar">

    <div class="logo">
      中越代购 ERP
    </div>

    <div class="menu">

      <button onclick="showPage('dashboard')">
        🏠 首页
      </button>

      <button onclick="showPage('customers')">
        👥 客户管理
      </button>

      <button onclick="showPage('orders')">
        📦 订单管理
      </button>

      <button onclick="showPage('finance')">
        💰 财务管理
      </button>

      <button onclick="showPage('settings')">
        ⚙ 系统管理
      </button>

    </div>

  </aside>

  <!-- 主区域 -->

  <main class="main">

    <!-- 顶部 -->

    <header class="topbar">

      <div class="top-title">
        SaaS ERP 管理系统
      </div>

      <button
        class="logout-btn"
        onclick="logout()"
      >
        退出登录
      </button>

    </header>

    <!-- 首页 -->

    <section
      id="dashboard"
      class="page active"
    >

      <h2>
        首页仪表盘
      </h2>

      <div class="cards">

        <div class="card">

          <div class="card-title">
            今日营业额
          </div>

          <div
            class="card-value"
            id="todayRevenue"
          >
            ¥ 0
          </div>

        </div>

        <div class="card">

          <div class="card-title">
            今日订单
          </div>

          <div
            class="card-value"
            id="todayOrders"
          >
            0
          </div>

        </div>

        <div class="card">

          <div class="card-title">
            本月利润
          </div>

          <div
            class="card-value"
            id="monthProfit"
          >
            ¥ 0
          </div>

        </div>

      </div>

      <!-- 图表 -->

      <div class="chart-box">

        <canvas id="salesChart"></canvas>

      </div>

    </section>

    <!-- 客户管理 -->

    <section
      id="customers"
      class="page"
    >

      <div class="page-header">

        <h2>
          客户管理
        </h2>

        <button
          class="primary-btn"
          onclick="createCustomer()"
        >
          + 新增客户
        </button>

      </div>

      <!-- 搜索 -->

      <input
        type="text"
        placeholder="搜索客户 / 联系方式"
        class="search-input"
        oninput="searchCustomers(this.value)"
      />

      <!-- 客户列表 -->

      <div id="customersList">

        <p>
          正在加载客户...
        </p>

      </div>

    </section>

    <!-- 订单管理 -->

    <section
      id="orders"
      class="page"
    >

      <div class="page-header">

        <h2>
          订单管理
        </h2>

        <button
          class="primary-btn"
          onclick="openOrderModal()"
        >
          + 新增订单
        </button>

      </div>

      <!-- 搜索 -->

      <input
        type="text"
        placeholder="搜索客户 / 商品 / 平台"
        class="search-input"
        oninput="searchOrders(this.value)"
      />

      <!-- 订单列表 -->

      <div id="ordersList">

        <p>
          正在加载订单...
        </p>

      </div>

      <!-- 历史订单 -->

      <h3 class="archive-title">
        历史订单
      </h3>

      <div id="archiveOrders">

      </div>

    </section>

    <!-- 财务管理 -->

    <section
      id="finance"
      class="page"
    >

      <h2>
        财务管理
      </h2>

      <div class="cards">

        <div class="card">

          <div class="card-title">
            总营业额
          </div>

          <div
            class="card-value"
            id="financeRevenue"
          >
            ¥ 0
          </div>

        </div>

        <div class="card">

          <div class="card-title">
            总利润
          </div>

          <div
            class="card-value"
            id="financeProfit"
          >
            ¥ 0
          </div>

        </div>

      </div>

      <!-- 财务图表 -->

      <div class="chart-box">

        <canvas id="financeChart"></canvas>

      </div>

    </section>

    <!-- 系统管理 -->

    <section
      id="settings"
      class="page"
    >

      <h2>
        系统管理
      </h2>

      <div class="settings-grid">

        <div class="setting-card">
          修改密码
        </div>

        <div class="setting-card">
          多语言
        </div>

        <div class="setting-card">
          深色模式
        </div>

        <div class="setting-card">
          数据备份
        </div>

      </div>

    </section>

  </main>

  <!-- 手机底部导航 -->

  <nav class="mobile-nav">

    <button onclick="showPage('dashboard')">
      🏠
    </button>

    <button onclick="showPage('customers')">
      👥
    </button>

    <button onclick="showPage('orders')">
      📦
    </button>

    <button onclick="showPage('finance')">
      💰
    </button>

    <button onclick="showPage('settings')">
      ⚙
    </button>

  </nav>

  <!-- 新增订单弹窗 -->

  <div
    id="orderModal"
    class="modal"
  >

    <div class="modal-content">

      <h2>
        新增订单
      </h2>

      <input
        id="customerInput"
        placeholder="客户名称"
      />

      <input
        id="productInput"
        placeholder="商品名称"
      />

      <input
        id="platformInput"
        placeholder="平台"
      />

      <input
        id="amountInput"
        placeholder="金额"
        type="number"
      />

      <button
        onclick="submitOrder()"
        class="primary-btn"
      >
        保存订单
      </button>

      <button
        onclick="closeOrderModal()"
        class="close-btn"
      >
        关闭
      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
