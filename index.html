<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>中越代购 ERP</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

  <!-- 登录检测 -->

  <script>

    if(

      localStorage.getItem("erp_login")

      !==

      "true"

    ){

      location.href = "login.html"

    }

  </script>

  <!-- 左侧菜单 -->

  <aside class="sidebar">

    <div class="logo">
      中越代购 ERP
    </div>

    <div class="menu">

      <button onclick="showPage('dashboard')">
        🏠 首页
      </button>

      <button onclick="showPage('customers')">
        👥 客户管理
      </button>

      <button onclick="showPage('orders')">
        📦 订单管理
      </button>

      <button onclick="showPage('finance')">
        💰 财务管理
      </button>

      <button onclick="showPage('settings')">
        ⚙ 系统管理
      </button>

    </div>

  </aside>

  <!-- 主区域 -->

  <main class="main">

    <!-- 顶部 -->

    <header class="topbar">

      <div class="top-title">
        SaaS ERP 管理系统
      </div>

      <button
        class="logout-btn"
        onclick="logout()"
      >
        退出登录
      </button>

    </header>

    <!-- 首页 -->

    <section
      id="dashboard"
      class="page active"
    >

      <h2>
        首页仪表盘
      </h2>

      <div class="cards">

        <div class="card">

          <div class="card-title">
            今日营业额
          </div>

          <div class="card-value">
            ¥ 0
          </div>

        </div>

        <div class="card">

          <div class="card-title">
            今日订单
          </div>

          <div class="card-value">
            0
          </div>

        </div>

        <div class="card">

          <div class="card-title">
            本月利润
          </div>

          <div class="card-value">
            ¥ 0
          </div>

        </div>

      </div>

      <div class="chart-box">

        <canvas id="salesChart"></canvas>

      </div>

    </section>

    <!-- 客户管理 -->

    <section
      id="customers"
      class="page"
    >

      <div class="page-header">

        <h2>
          客户管理
        </h2>

        <button class="primary-btn">
          + 新增客户
        </button>

      </div>

      <div class="table-box">

        <table>

          <thead>

            <tr>

              <th>客户</th>

              <th>联系方式</th>

              <th>地址</th>

              <th>累计消费</th>

            </tr>

          </thead>

          <tbody>

            <tr>

              <td>张三</td>

              <td>微信 / Zalo</td>

              <td>河内</td>

              <td>¥ 2000</td>

            </tr>

          </tbody>

        </table>

      </div>

    </section>

    <!-- 订单管理 -->

    <section
      id="orders"
      class="page"
    >

      <div class="page-header">

        <h2>
          订单管理
        </h2>

        <button
          class="primary-btn"
          onclick="createOrder()"
        >
          + 新增订单
        </button>

      </div>

      <!-- 搜索 -->

      <input
        type="text"
        placeholder="搜索客户 / 商品 / 平台"
        class="search-input"
        oninput="searchOrders(this.value)"
      />

      <!-- 订单列表 -->

      <div id="ordersList">

        <p>
          正在加载订单...
        </p>

      </div>

    </section>

    <!-- 财务管理 -->

    <section
      id="finance"
      class="page"
    >

      <h2>
        财务管理
      </h2>

      <div class="cards">

        <div class="card">

          <div class="card-title">
            总营业额
          </div>

          <div class="card-value">
            ¥ 0
          </div>

        </div>

        <div class="card">

          <div class="card-title">
            总利润
          </div>

          <div class="card-value">
            ¥ 0
          </div>

        </div>

      </div>

      <div class="chart-box">

        <canvas id="financeChart"></canvas>

      </div>

    </section>

    <!-- 系统管理 -->

    <section
      id="settings"
      class="page"
    >

      <h2>
        系统管理
      </h2>

      <div class="settings-grid">

        <div class="setting-card">
          修改密码
        </div>

        <div class="setting-card">
          多语言
        </div>

        <div class="setting-card">
          深色模式
        </div>

        <div class="setting-card">
          数据备份
        </div>

      </div>

    </section>

  </main>

  <!-- 手机底部导航 -->

  <nav class="mobile-nav">

    <button onclick="showPage('dashboard')">
      🏠
    </button>

    <button onclick="showPage('customers')">
      👥
    </button>

    <button onclick="showPage('orders')">
      📦
    </button>

    <button onclick="showPage('finance')">
      💰
    </button>

    <button onclick="showPage('settings')">
      ⚙
    </button>

  </nav>

  <!-- 退出登录 -->

  <script>

    function logout(){

      localStorage.removeItem("erp_login")

      location.href = "login.html"

    }

  </script>

  <script src="app.js"></script>

</body>
</html>
